<canvas id="c" width="600" height="400" style="display:block;margin:0 auto;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:#1a1a2e;cursor:default;max-width:100%"></canvas>
<div id="info" style="text-align:center;margin-top:8px;font-size:13px;color:var(--color-text-secondary)">方向键 / WASD 控制 · R 键重新开始</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 400, SZ = 20;
const COLS = W/SZ, ROWS = H/SZ;
const COLORS = {
  bg: '#1a1a2e',
  grid: 'rgba(255,255,255,0.03)',
  snakeHead: '#4ade80',
  snakeBody: '#22c55e',
  snakeBorder: '#16a34a',
  food: '#f87171',
  foodBorder: '#dc2626',
  text: '#f1f5f9',
  overlay: 'rgba(10,10,30,0.82)',
  score: '#94a3b8',
  accent: '#818cf8'
};
let snake, dir, nextDir, food, score, best, state, timer, moveInterval;
best = 0;

function init() {
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; state = 'play';
  spawnFood();
  clearInterval(timer);
  timer = setInterval(step, 200);
}

function spawnFood() {
  let pos;
  do { pos = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===pos.x&&s.y===pos.y));
  food = pos;
}

function step() {
  if(state !== 'play') return;
  dir = nextDir;
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    state='over'; if(score>best) best=score; draw(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y) { score+=10; spawnFood(); }
  else snake.pop();
  draw();
}

function drawGrid() {
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*SZ,0);ctx.lineTo(x*SZ,H);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*SZ);ctx.lineTo(W,y*SZ);ctx.stroke();}
}

function drawRoundRect(x,y,w,h,r,fill,stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
}

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0,0,W,H);
  drawGrid();
  const pad=2, r=4;
  snake.forEach((s,i)=>{
    const grd = ctx.createLinearGradient(s.x*SZ,s.y*SZ,(s.x+1)*SZ,(s.y+1)*SZ);
    if(i===0){grd.addColorStop(0,'#6ee7a0');grd.addColorStop(1,'#22c55e');}
    else{grd.addColorStop(0,'#22c55e');grd.addColorStop(1,'#16a34a');}
    drawRoundRect(s.x*SZ+pad,s.y*SZ+pad,SZ-pad*2,SZ-pad*2,r,i===0?COLORS.snakeHead:COLORS.snakeBody,i===0?'#bbf7d0':null);
    if(i===0){
      ctx.fillStyle='#1a1a2e';
      const ex=dir.x, ey=dir.y;
      const ex2=-ey, ey2=ex;
      const cx=(s.x+0.5)*SZ, cy=(s.y+0.5)*SZ;
      const eSz=2;
      [[ex*4+ex2*3,ey*4+ey2*3],[ex*4-ex2*3,ey*4-ey2*3]].forEach(([dx,dy])=>{
        ctx.beginPath(); ctx.arc(cx+dx,cy+dy,eSz,0,Math.PI*2); ctx.fill();
      });
    }
  });
  const fp=3;
  const grd2=ctx.createRadialGradient((food.x+0.5)*SZ,(food.y+0.5)*SZ,1,(food.x+0.5)*SZ,(food.y+0.5)*SZ,SZ/2-2);
  grd2.addColorStop(0,'#fca5a5'); grd2.addColorStop(1,'#ef4444');
  drawRoundRect(food.x*SZ+fp,food.y*SZ+fp,SZ-fp*2,SZ-fp*2,5,COLORS.food,null);
  ctx.fillStyle='rgba(252,165,165,0.35)';
  ctx.beginPath(); ctx.arc((food.x+0.5)*SZ-3,(food.y+0.5)*SZ-3,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=COLORS.text;
  ctx.font='500 14px sans-serif'; ctx.textAlign='left';
  ctx.fillText('分数: '+score, 10, 22);
  ctx.textAlign='right';
  ctx.fillStyle=COLORS.score;
  ctx.fillText('最高: '+best, W-10, 22);
  if(state==='idle'||state==='over') {
    ctx.fillStyle=COLORS.overlay; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if(state==='over') {
      ctx.font='500 32px sans-serif'; ctx.fillStyle='#f87171';
      ctx.fillText('游戏结束', W/2, H/2-50);
      ctx.font='500 20px sans-serif'; ctx.fillStyle=COLORS.text;
      ctx.fillText('最终分数：'+score, W/2, H/2-10);
      if(score>=best&&score>0){ctx.font='14px sans-serif';ctx.fillStyle=COLORS.accent;ctx.fillText('新纪录！', W/2, H/2+20);}
    } else {
      ctx.font='500 28px sans-serif'; ctx.fillStyle=COLORS.snakeHead;
      ctx.fillText('贪吃蛇', W/2, H/2-30);
    }
    ctx.font='16px sans-serif'; ctx.fillStyle=COLORS.score;
    ctx.fillText('按 R 键开始 / 重新开始', W/2, H/2+60);
  }
}

document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','r','R',' '].includes(e.key)) e.preventDefault();
  const k=e.key;
  if(k==='r'||k==='R') { init(); return; }
  if(state!=='play') return;
  if((k==='ArrowUp'||k==='w')&&dir.y!==1) nextDir={x:0,y:-1};
  else if((k==='ArrowDown'||k==='s')&&dir.y!==-1) nextDir={x:0,y:1};
  else if((k==='ArrowLeft'||k==='a')&&dir.x!==1) nextDir={x:-1,y:0};
  else if((k==='ArrowRight'||k==='d')&&dir.x!==-1) nextDir={x:1,y:0};
});

canvas.setAttribute('tabindex','0');
canvas.addEventListener('click',()=>canvas.focus());

state='idle'; draw();
</script>
